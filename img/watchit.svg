<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- Deep cinema backdrop -->
    <radialGradient id="bg" cx="50%" cy="50%" r="65%">
      <stop offset="0%" style="stop-color:#262042"/>
      <stop offset="100%" style="stop-color:#0a0614"/>
    </radialGradient>
    <!-- Rust accent -->
    <linearGradient id="rust" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f74c00"/>
      <stop offset="100%" style="stop-color:#b7410e"/>
    </linearGradient>
    <!-- Film strip steel -->
    <linearGradient id="strip" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a38"/>
      <stop offset="100%" style="stop-color:#16161f"/>
    </linearGradient>
    <!-- Projector beam -->
    <linearGradient id="beam" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%"  style="stop-color:#ffe9a8;stop-opacity:0.75"/>
      <stop offset="100%" style="stop-color:#ffe9a8;stop-opacity:0"/>
    </linearGradient>
    <!-- Screen glow -->
    <radialGradient id="screen" cx="50%" cy="40%" r="60%">
      <stop offset="0%"  style="stop-color:#fff6d8"/>
      <stop offset="60%" style="stop-color:#ffd890"/>
      <stop offset="100%" style="stop-color:#d99240"/>
    </radialGradient>
  </defs>
  <style>
    @keyframes sprockets { to { transform: translateY(-14px); } }
    @keyframes blink { 0%, 45%, 55%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    @keyframes twinkle { 0%, 100% { opacity: 0.25; } 50% { opacity: 1; } }
    @keyframes flicker { 0%, 100% { opacity: 0.85; } 50% { opacity: 1; } }
    .strip { animation: sprockets 1.2s linear infinite; }
    .strip-reverse { animation: sprockets 1.2s linear infinite reverse; }
    .eye { transform-origin: center; animation: blink 4s ease-in-out infinite; }
    .tw { animation: twinkle 2s ease-in-out infinite; }
    .tw2 { animation: twinkle 2s ease-in-out 0.7s infinite; }
    .tw3 { animation: twinkle 2s ease-in-out 1.3s infinite; }
    .beam { animation: flicker 1.6s ease-in-out infinite; }
  </style>

  <!-- Night sky backdrop -->
  <circle cx="128" cy="128" r="120" fill="url(#bg)" stroke="url(#rust)" stroke-width="3"/>

  <!-- Twinkling stars -->
  <circle class="tw"  cx="42"  cy="54"  r="1.6" fill="#ffffff"/>
  <circle class="tw2" cx="216" cy="48"  r="1.3" fill="#ffffff"/>
  <circle class="tw3" cx="34"  cy="196" r="1.5" fill="#ffffff"/>
  <circle class="tw"  cx="220" cy="202" r="1.4" fill="#ffffff"/>
  <circle class="tw2" cx="56"  cy="40"  r="1.1" fill="#ffffff"/>
  <circle class="tw3" cx="206" cy="74"  r="1.0" fill="#ffffff"/>

  <!-- Light beam from projector to screen -->
  <polygon points="44,116 44,140 198,164 198,92" fill="url(#beam)" class="beam"/>

  <!-- Cinema screen on the right -->
  <rect x="154" y="72" width="68" height="112" rx="4" fill="url(#screen)"
        stroke="url(#rust)" stroke-width="2.5"/>

  <!-- Screen content: a soft star + play triangle -->
  <g opacity="0.35">
    <polygon points="188,110 192,130 212,130 196,142 202,162 188,150 174,162 180,142 164,130 184,130"
             fill="#ffffff"/>
  </g>
  <polygon points="176,120 176,146 198,133" fill="#f74c00" opacity="0.85"/>

  <!-- Projector body on the left -->
  <g>
    <!-- Lens -->
    <circle cx="56" cy="128" r="14" fill="#0a0a14" stroke="url(#rust)" stroke-width="2"/>
    <circle cx="56" cy="128" r="8"  fill="#1a1a2a"/>
    <circle cx="56" cy="128" r="4"  fill="#f74c00"/>

    <!-- Body -->
    <rect x="22" y="92" width="36" height="72" rx="4"
          fill="#18182a" stroke="url(#rust)" stroke-width="2"/>

    <!-- Top reel -->
    <circle cx="40" cy="84" r="14" fill="#18182a" stroke="url(#rust)" stroke-width="2"/>
    <circle cx="40" cy="84" r="3"  fill="#f74c00"/>
    <!-- Bottom reel -->
    <circle cx="40" cy="172" r="14" fill="#18182a" stroke="url(#rust)" stroke-width="2"/>
    <circle cx="40" cy="172" r="3"  fill="#f74c00"/>
  </g>

  <!-- Film strip threading vertically, sprockets scrolling -->
  <g>
    <!-- Strip background -->
    <rect x="33" y="92" width="14" height="72" fill="url(#strip)"/>
    <!-- Sprocket holes (animated) -->
    <g class="strip">
      <rect x="36" y="92" width="8" height="3" fill="#0a0a14" rx="1"/>
      <rect x="36" y="106" width="8" height="3" fill="#0a0a14" rx="1"/>
      <rect x="36" y="120" width="8" height="3" fill="#0a0a14" rx="1"/>
      <rect x="36" y="134" width="8" height="3" fill="#0a0a14" rx="1"/>
      <rect x="36" y="148" width="8" height="3" fill="#0a0a14" rx="1"/>
      <rect x="36" y="162" width="8" height="3" fill="#0a0a14" rx="1"/>
      <rect x="36" y="176" width="8" height="3" fill="#0a0a14" rx="1"/>
    </g>
  </g>

  <!-- Eyes (subtle, on projector top) -->
  <g class="eye">
    <circle cx="52" cy="78" r="1.6" fill="#ffe9a8"/>
  </g>
  <g class="eye">
    <circle cx="68" cy="78" r="1.6" fill="#ffe9a8"/>
  </g>
</svg>
